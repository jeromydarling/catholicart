name: cf · set pages env var

# Sets (or updates) one environment variable on a Cloudflare Pages
# project. Apply to both production and preview unless overridden.
#
# Trigger via the GitHub MCP (workflow_dispatch) with the four inputs.
# Value is masked in logs by GitHub Actions when marked sensitive.

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Pages project name (slug)"
        required: true
        type: string
      var_name:
        description: "Variable name (e.g. VITE_MAPBOX_TOKEN)"
        required: true
        type: string
      var_value:
        description: "Variable value"
        required: true
        type: string
      env_target:
        description: "Target environment(s)"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - production
          - preview

jobs:
  set:
    runs-on: ubuntu-latest
    steps:
      - name: Set environment variable on Pages project
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT: ${{ inputs.project_name }}
          VAR_NAME: ${{ inputs.var_name }}
          VAR_VALUE: ${{ inputs.var_value }}
          ENV_TARGET: ${{ inputs.env_target }}
        run: |
          set -euo pipefail

          # Mask the value in logs
          echo "::add-mask::$VAR_VALUE"

          # Build the targets list
          if [ "$ENV_TARGET" = "both" ]; then
            TARGETS="production preview"
          else
            TARGETS="$ENV_TARGET"
          fi

          # Fetch current config, then PATCH with the merged variables
          # for each target environment. PATCH replaces the env_vars
          # object, so we merge with existing values to avoid clobbering.
          CONFIG=$(curl -fsS \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$PROJECT")

          for TARGET in $TARGETS; do
            echo "→ $TARGET · $VAR_NAME"

            # Merge new var into existing env_vars for this target
            PATCH=$(jq -n \
              --arg name "$VAR_NAME" \
              --arg value "$VAR_VALUE" \
              --arg target "$TARGET" \
              --argjson cfg "$CONFIG" '
                {
                  deployment_configs: (
                    $cfg.result.deployment_configs
                    | .[$target].env_vars |= (. // {}) + {
                        ($name): { type: "plain_text", value: $value }
                      }
                  )
                }
              ')

            curl -fsS \
              -X PATCH \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "$PATCH" \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$PROJECT" \
              | jq '.success'
          done

          echo "✓ $VAR_NAME set on $TARGETS"
