name: cf · set worker secret(s)

# Sets one or more environment variables (secrets) on a Cloudflare
# Worker. Workers don't distinguish "env var" vs "secret" the same way
# Pages does — both are stored as encrypted secrets accessible to the
# Worker via env bindings.
#
# Leave any input blank to skip that variable.

on:
  workflow_dispatch:
    inputs:
      worker_name:
        description: "Worker name (matches the 'name' in wrangler.jsonc)"
        required: true
        default: "catholicart"
        type: string
      vite_mapbox_token:
        description: "VITE_MAPBOX_TOKEN (pk.ey…). Blank to skip."
        required: false
        type: string
      vite_mapbox_style:
        description: "VITE_MAPBOX_STYLE (mapbox://styles/…). Blank to skip."
        required: false
        type: string
      vite_sentry_dsn:
        description: "VITE_SENTRY_DSN. Blank to skip."
        required: false
        type: string
      auth_secret:
        description: "AUTH_SECRET (random 32+ char string). Generate: openssl rand -base64 32"
        required: false
        type: string
      anthropic_api_key:
        description: "ANTHROPIC_API_KEY (sk-ant-…) — Claude Sonnet for vocation synthesis."
        required: false
        type: string

jobs:
  set:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Set secrets via Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER: ${{ inputs.worker_name }}
          V_MAPBOX_TOKEN: ${{ inputs.vite_mapbox_token }}
          V_MAPBOX_STYLE: ${{ inputs.vite_mapbox_style }}
          V_SENTRY_DSN: ${{ inputs.vite_sentry_dsn }}
          V_AUTH_SECRET: ${{ inputs.auth_secret }}
          V_ANTHROPIC_KEY: ${{ inputs.anthropic_api_key }}
        run: |
          set -euo pipefail

          # Mask any non-empty values
          for v in "$V_MAPBOX_TOKEN" "$V_MAPBOX_STYLE" "$V_SENTRY_DSN" "$V_AUTH_SECRET" "$V_ANTHROPIC_KEY"; do
            [ -n "$v" ] && echo "::add-mask::$v"
          done

          set_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then return; fi
            echo "→ $name"
            echo -n "$value" | npx wrangler@latest secret put "$name" --name "$WORKER"
          }

          set_secret "VITE_MAPBOX_TOKEN" "$V_MAPBOX_TOKEN"
          set_secret "VITE_MAPBOX_STYLE" "$V_MAPBOX_STYLE"
          set_secret "VITE_SENTRY_DSN"   "$V_SENTRY_DSN"
          set_secret "AUTH_SECRET"       "$V_AUTH_SECRET"
          set_secret "ANTHROPIC_API_KEY" "$V_ANTHROPIC_KEY"

          echo "✓ Done. Outbound email uses the Cloudflare Email Service"
          echo "  send_email binding — no API key needed; just make sure"
          echo "  the EMAIL_FROM domain is onboarded with SPF + DKIM."
