name: cf · redeploy pages project

# Triggers a fresh deployment of a Cloudflare Pages project, picking up
# any env var changes. Use after cf-pages-env runs.

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Pages project name (slug)"
        required: true
        type: string
      branch:
        description: "Branch to deploy (production branch by default)"
        required: false
        default: "main"
        type: string

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger redeployment
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT: ${{ inputs.project_name }}
          BRANCH: ${{ inputs.branch }}
        run: |
          set -euo pipefail
          curl -fsS \
            -X POST \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"branch\": \"$BRANCH\"}" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$PROJECT/deployments" \
            | jq '{ id, url, environment, created_on }'
          echo "✓ Triggered deployment for $PROJECT on $BRANCH"
