name: cf · list workers + secrets

# Lists every Worker in the account, plus the names (not values) of
# secrets bound to each. Useful for verifying that env vars landed
# correctly after cf-worker-secret-bulk runs.

on:
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: List workers
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          echo "──────── workers ────────"
          WORKERS=$(curl -fsS \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts")
          echo "$WORKERS" | jq '.result[] | { id, created_on, modified_on }'

          echo
          echo "──────── secret names per worker ────────"
          echo "$WORKERS" | jq -r '.result[].id' | while read -r W; do
            echo
            echo ">>> $W"
            curl -fsS \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts/$W/secrets" \
              | jq '.result[] | { name, type }' \
              || echo "  (no secrets or no permission)"
          done
