<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ars Sacra — Hero</title>
    <!--
      Hyperframes composition for the hero video.
      Read the manifest produced by `npm run fetch-assets` and render a
      sequence of Ken Burns shots over a Gregorian-chant bed, with a
      "COMMISSIONED" overlay for each work.

      Conventions used:
        data-hf-fps    — frame rate
        data-hf-width  / data-hf-height — output resolution
        data-hf-duration — total duration in seconds
        Element timing via data-start / data-end (seconds).
        Animations driven by GSAP (loaded below).

      Run: npm run render-hero
    -->
    <style>
      :root {
        color-scheme: dark;
        --ink: #1c160e;
        --parchment: #fbf8f1;
        --burgundy: #7a1f2c;
        --gold: #c9a961;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background: var(--ink); color: var(--parchment);
        font-family: "Cormorant Garamond", Georgia, serif;
        overflow: hidden;
      }
      .stage { position: absolute; inset: 0; }
      .shot {
        position: absolute; inset: 0;
        display: grid; place-items: center;
        opacity: 0;
      }
      .shot img {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        transform: scale(1.02);
      }
      .vignette {
        position: absolute; inset: 0;
        background: linear-gradient(
          180deg,
          rgba(28,22,14,0.55) 0%,
          rgba(28,22,14,0.35) 35%,
          rgba(28,22,14,0.65) 75%,
          rgba(28,22,14,0.85) 100%
        );
      }
      .caption {
        position: absolute;
        right: 56px; bottom: 56px;
        max-width: 460px;
        background: rgba(251,248,241,0.96);
        color: var(--ink);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(28,22,14,0.1);
        border-radius: 8px;
        padding: 22px 26px;
        box-shadow: 0 24px 60px -20px rgba(0,0,0,0.45);
      }
      .eyebrow {
        font-family: "Inter", system-ui, sans-serif;
        font-size: 11px; font-weight: 600;
        letter-spacing: 0.32em; text-transform: uppercase;
        color: var(--burgundy);
        margin-bottom: 6px;
      }
      .title {
        font-style: italic;
        font-size: 28px;
        line-height: 1.15;
        margin: 0;
      }
      .meta {
        font-family: "Inter", system-ui, sans-serif;
        font-size: 12px; letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(28,22,14,0.6);
        margin-top: 8px;
      }
      .patron-label {
        margin-top: 18px; padding-top: 14px;
        border-top: 1px solid rgba(28,22,14,0.1);
        font-family: "Inter", system-ui, sans-serif;
        font-size: 10px; letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(168,137,63,0.9);
        margin-bottom: 6px;
      }
      .patron {
        font-family: "Spectral", Georgia, serif;
        font-size: 16px; line-height: 1.4;
        color: rgba(28,22,14,0.85);
      }
      .endcard {
        position: absolute; inset: 0;
        display: grid; place-items: center;
        text-align: center;
        opacity: 0;
      }
      .endcard h1 {
        font-size: 96px; line-height: 1.02;
        letter-spacing: -0.02em;
        max-width: 1100px;
        margin: 0;
      }
      .endcard h1 em { color: var(--gold); }
      .endcard p {
        font-family: "Inter", system-ui, sans-serif;
        font-size: 14px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(251,248,241,0.7);
        margin-top: 28px;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Spectral:wght@400&family=Inter:wght@500;600&display=swap"
    />
    <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
  </head>
  <body
    data-hf-fps="30"
    data-hf-width="1920"
    data-hf-height="1080"
    data-hf-duration="46"
  >
    <div class="stage" id="stage"></div>

    <audio
      id="bed"
      src="../../public/assets/audio/asperges-me.mp3"
      data-hf-track="audio"
    ></audio>

    <div class="endcard" id="endcard">
      <div>
        <h1>
          Today, the same.
          <br /><em>Commission a Catholic artist.</em>
        </h1>
        <p>Ars Sacra · A guild for Catholic artists</p>
      </div>
    </div>

    <script type="module">
      // Read the manifest fetched by scripts/fetch-assets.mjs.
      const manifest = await fetch("../../public/assets/manifest.json").then(
        (r) => r.json(),
      );
      const works = (manifest.works || []).filter((w) => w.image);
      const SHOT_S = 6;
      const FADE_S = 1.2;

      const stage = document.getElementById("stage");
      works.forEach((w, i) => {
        const start = i * SHOT_S;
        const el = document.createElement("div");
        el.className = "shot";
        el.dataset.start = start;
        el.dataset.end = start + SHOT_S + FADE_S;
        el.innerHTML = `
          <img src="..${w.image}" alt="${w.title}" />
          <div class="vignette"></div>
          <figure class="caption">
            <div class="eyebrow">Commissioned</div>
            <p class="title">${w.title}</p>
            <div class="meta">${w.artist} · ${w.year}</div>
            <div class="patron-label">Patron</div>
            <p class="patron">${w.patron}</p>
          </figure>
        `;
        stage.appendChild(el);

        gsap.to(el.querySelector("img"), {
          scale: 1.16,
          duration: SHOT_S + FADE_S,
          ease: "none",
          delay: start,
        });
        gsap
          .timeline({ delay: start })
          .to(el, { opacity: 1, duration: FADE_S })
          .to(el, { opacity: 1, duration: SHOT_S - FADE_S })
          .to(el, { opacity: 0, duration: FADE_S });
      });

      const endStart = works.length * SHOT_S;
      const endcard = document.getElementById("endcard");
      gsap
        .timeline({ delay: endStart })
        .to(endcard, { opacity: 1, duration: 1.2 })
        .to(endcard, { opacity: 1, duration: 3 });
    </script>
  </body>
</html>
